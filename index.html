<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construction Website</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.5rem;
            background: #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .navbar .logo img {
            height: 72px;
            width: auto;
            border-radius: 8px;
        }

        .navbar .logo h1 {
            margin: 0;
            font-size: 1.25rem;
            color: #042a52;
            letter-spacing: 0.02em;
        }

        .navbar .nav-links {
            display: flex;
            align-items: center;
            gap: 1.4rem;
            margin-left: 0;
        }

        .navbar .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: #000;
            font-size: 1.05rem;
        }

        .navbar .nav-links a:hover {
            color: #f7a600;
        }

        .navbar .cta {
            padding: 0.55rem 1.4rem;
            background: #fff;
            color: #000;
            border: 2px solid #f79a00;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 1.05rem;
        }

        .navbar .cta:hover {
            background: #fff7e6;
            border-color: #ffab00;
        }

        @media (max-width: 900px) {
            .navbar {
                flex-wrap: wrap;
                gap: 0.75rem;
            }

            .navbar .nav-links {
                order: 3;
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .navbar .cta {
                order: 2;
            }
        }

        .hero-banner {
            min-height: calc(100vh - 88px);
            background: url("images/banner.png") center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            padding: 2rem;
            color: #fff;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            mix-blend-mode: multiply;
        }

        .hero-content {
            position: relative;
            width: 100%;
            max-width: 1220px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2rem;
            align-items: start;
            z-index: 1;
        }

        .hero-text small {
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #f7a600;
            font-weight: 700;
        }

        .hero-text h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            margin: 0.3rem 0 1rem;
            line-height: 1.1;
        }

        .hero-text h1 span {
            color: #f7a600;
        }

        .hero-text p {
            max-width: 520px;
            line-height: 1.6;
            margin-bottom: 1.2rem;
            color: #f5f5f5;
        }

        .btn-primary {
            display: inline-block;
            background: #f79a00;
            color: #fff;
            padding: 0.8rem 1.3rem;
            border-radius: 999px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .hero-form {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #f7a600;
            border-radius: 18px;
            color: #0f1f39;
            padding: 1.2rem;
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.25);
            max-width: 420px;
        }

        .hero-form h3 {
            margin: 0 0 1rem;
            font-size: 1.7rem;
            color: #042a52;
        }

        .hero-form form {
            display: grid;
            gap: 0.8rem;
        }

        .hero-form input,
        .hero-form select,
        .hero-form button {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            border-radius: 12px;
            border: 1px solid #dce4f0;
            padding: 0.9rem 1rem;
            font-size: 1rem;
        }

        .hero-form input:focus,
        .hero-form select:focus,
        .hero-form button:focus {
            outline: none;
            border-color: #f79a00;
            box-shadow: 0 0 0 3px rgba(247, 154, 0, 0.24);
        }

        .hero-form button {
            background: #f79a00;
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 0.9rem 1rem;
            cursor: pointer;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 960px) {
            .hero-content {
                grid-template-columns: 1fr;
            }

            .hero-banner {
                min-height: auto;
                padding: 1.2rem;
            }

            .hero-text h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="navbar-left">
            <a href="#" class="logo">
                <img src="images/logo.png" alt="Housing Logo" />
            </a>
            <nav class="nav-links" aria-label="Primary">
                <a href="#home">Home</a>
                <a href="#services">Services</a>
                <a href="#projects">Projects</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
        <a href="#consultation" class="cta">Free Consultation <span aria-hidden="true">→</span></a>
    </header>

    <main>
        <section class="hero-banner" id="home">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <div class="hero-text">
                    <small>Build Your Future</small>
                    <h1>Build with <span>Confidence</span></h1>
                    <p>Premium construction materials with guaranteed quality checks, price protection, and 24/7 project
                        tracking.</p>
                    <a href="#contact" class="btn-primary">Get Free Estimate</a>
                </div>
                <div class="hero-form" aria-label="Talk to Our Expert">
                    <h3>Talk to Our Expert</h3>
                    <form>
                        <label>
                            <span class="sr-only">Name</span>
                            <input type="text" placeholder="Name" required />
                        </label>
                        <label>
                            <span class="sr-only">Phone Number</span>
                            <input type="tel" placeholder="+91- Phone Number" required />
                        </label>
                        <label>
                            <span class="sr-only">Project Type</span>
                            <select required>
                                <option value="">Select type</option>
                                <option>Residential</option>
                                <option>Commercial</option>
                                <option>Industrial</option>
                            </select>
                        </label>
                        <label>
                            <span class="sr-only">Location</span>
                            <select required>
                                <option value="">Location</option>
                                <option>Chennai</option>
                                <option>Bengaluru</option>
                                <option>Mumbai</option>
                            </select>
                        </label>
                        <button type="submit" class="btn-primary">Book Free Consultation</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
