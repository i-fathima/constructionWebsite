<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construction Website</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.5rem;
            background: #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .navbar .logo img {
            height: 72px;
            width: auto;
            border-radius: 8px;
        }

        .navbar .logo h1 {
            margin: 0;
            font-size: 1.25rem;
            color: #042a52;
            letter-spacing: 0.02em;
        }

        .navbar .nav-links {
            display: flex;
            align-items: center;
            gap: 1.4rem;
            margin-left: 0;
        }

        .navbar .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: #000;
            font-size: 1.05rem;
        }

        .navbar .nav-links a:hover {
            color: #f7a600;
        }

        .navbar .cta {
            padding: 0.55rem 1.4rem;
            background: #fff;
            color: #000;
            border: 2px solid #f79a00;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 1.05rem;
        }

        .navbar .cta:hover {
            background: #fff7e6;
            border-color: #ffab00;
        }

        @media (max-width: 900px) {
            .navbar {
                flex-wrap: wrap;
                gap: 0.75rem;
            }

            .navbar .nav-links {
                order: 3;
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .navbar .cta {
                order: 2;
            }
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="navbar-left">
            <a href="#" class="logo">
                <img src="images/logo.png" alt="Housing Logo" />
            </a>
            <nav class="nav-links" aria-label="Primary">
                <a href="#home">Home</a>
                <a href="#services">Services</a>
                <a href="#projects">Projects</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
        <a href="#consultation" class="cta">Free Consultation <span aria-hidden="true">→</span></a>
    </header>

    <main style="padding: 2rem;">
        <section id="home">
            <h2>Welcome to BluePeak Construction</h2>
            <p>Logo for the navbar now uses <strong>housing.webp</strong> and the layout matches your sample navigation
                style.</p>
        </section>
    </main>
</body>

</html>
